<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bullseye - Colecionadores</title>
    <!-- Tailwind CSS para o Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js para as Funções (Simula o React sem precisar instalar nada) -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .bullseye-gradient { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
    </style>
</head>
<body class="bg-gray-50 text-slate-900 pb-24" x-data="app()">

    <!-- HEADER -->
    <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center border-2 border-red-200">
                <div class="w-4 h-4 bg-white rounded-full border-4 border-red-500"></div>
            </div>
            <h1 class="text-2xl font-black tracking-tight">Bullseye</h1>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-1 border rounded-full px-2 py-1 text-xs font-bold bg-gray-50">
                <img src="https://flagcdn.com/w20/br.png" class="w-4 h-3"> PT...
            </div>
            <i data-lucide="menu" class="w-6 h-6"></i>
        </div>
    </header>

    <!-- TABS SELECTOR -->
    <div class="flex justify-center p-3 bg-white border-b gap-2">
        <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'bg-gray-100 border' : 'text-gray-400'" class="px-6 py-2 rounded-xl font-bold transition text-sm uppercase tracking-wider">Dashboard</button>
        <button @click="view = 'preview'" :class="view === 'preview' ? 'bg-gray-100 border' : 'text-gray-400'" class="px-6 py-2 rounded-xl font-bold transition text-sm uppercase tracking-wider">Preview</button>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="p-4 max-w-xl mx-auto">

        <!-- TELA: MINHA COLEÇÃO (DASHBOARD) -->
        <template x-if="view === 'dashboard'">
            <div class="space-y-6">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-3xl font-black italic uppercase tracking-tighter">Minha Coleção</h2>
                        <p class="text-gray-500 text-xs">Adicione fotos dos produtos • +10 pontos por item</p>
                    </div>
                    <label class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 shadow-lg cursor-pointer active:scale-95 transition">
                        <i data-lucide="plus" class="w-5 h-5"></i> Adicionar Item
                        <input type="file" class="hidden" @change="addItem($event)">
                    </label>
                </div>

                <!-- CARD DE PONTOS / RANKING -->
                <div class="bullseye-gradient rounded-[2rem] p-6 text-white flex justify-between items-center shadow-2xl">
                    <div>
                        <p class="text-xs font-bold uppercase opacity-80">Total na Coleção</p>
                        <h3 class="text-5xl font-black tracking-tighter" x-text="items.length + ' itens'"></h3>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold uppercase opacity-80">Pontos Totais</p>
                        <div class="flex items-center justify-end gap-1 text-4xl font-black italic text-yellow-300">
                            ★ <span x-text="points"></span>
                        </div>
                    </div>
                </div>

                <!-- LISTA DE ITENS -->
                <div class="grid grid-cols-1 gap-4">
                    <template x-for="item in items" :key="item.id">
                        <div class="bg-white rounded-3xl border shadow-sm overflow-hidden animate-in fade-in zoom-in duration-300">
                            <div class="relative h-56 bg-gray-200">
                                <img :src="item.img" class="w-full h-full object-cover">
                                <span class="absolute top-4 left-4 bg-green-100 text-green-700 text-[10px] font-black px-3 py-1 rounded-full border border-green-200 uppercase" x-text="item.rarity"></span>
                                <button @click="removeItem(item.id)" class="absolute top-4 right-4 p-2 bg-black/40 text-white rounded-xl backdrop-blur-md">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                            <div class="p-5">
                                <h4 class="font-black text-xl italic uppercase" x-text="item.name"></h4>
                                <div class="flex justify-between items-center mt-2">
                                    <p class="text-gray-400 text-xs font-bold uppercase" x-text="item.category"></p>
                                    <span class="bg-blue-500 text-white text-[10px] font-black px-2 py-0.5 rounded italic">NOVO</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- TELA: IA ESPECIALISTA -->
        <template x-if="view === 'ai'">
            <div class="flex flex-col h-[75vh] bg-white rounded-[2.5rem] border shadow-2xl overflow-hidden">
                <div class="bg-purple-700 p-5 text-white flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center border border-white/30">
                        <i data-lucide="scan-search" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h3 class="font-black text-lg">Especialista de Raridade</h3>
                        <p class="text-[10px] uppercase font-bold opacity-70 tracking-widest text-purple-200">IA de Alta Precisão</p>
                    </div>
                </div>

                <div class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50" id="chat-box">
                    <template x-for="msg in messages">
                        <div :class="msg.role === 'ai' ? 'bg-white border self-start rounded-tr-3xl rounded-br-3xl rounded-bl-3xl' : 'bg-red-500 text-white self-end rounded-tl-3xl rounded-tr-3xl rounded-bl-3xl ml-auto'" 
                             class="max-w-[85%] p-4 shadow-sm text-sm font-medium leading-relaxed">
                            <span x-html="msg.text"></span>
                        </div>
                    </template>
                </div>

                <div class="p-4 border-t bg-white flex gap-2 items-center">
                    <label class="p-3 text-gray-400 bg-gray-100 rounded-2xl cursor-pointer hover:bg-gray-200 transition">
                        <i data-lucide="camera" class="w-6 h-6"></i>
                        <input type="file" class="hidden" @change="analyzeRarity($event)">
                    </label>
                    <input type="text" placeholder="Pergunte sobre seu item..." class="flex-1 p-4 rounded-2xl bg-gray-100 text-sm outline-none focus:ring-2 ring-red-500/20">
                    <button class="p-4 bg-red-500 text-white rounded-2xl font-black italic uppercase text-xs shadow-lg shadow-red-200">Enviar</button>
                </div>
            </div>
        </template>

        <!-- TELA: RANKING -->
        <template x-if="view === 'ranking'">
            <div class="space-y-6">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter text-center">Global Ranking</h2>
                <div class="space-y-3">
                    <!-- Usuário Atual (Simulado) -->
                    <div class="bg-yellow-50 border-2 border-yellow-200 p-4 rounded-3xl flex items-center justify-between shadow-lg">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-2xl italic text-yellow-600">#1</span>
                            <div class="w-12 h-12 bg-red-500 rounded-full flex items-center justify-center font-bold text-white border-2 border-white">VC</div>
                            <span class="font-black uppercase tracking-tight">Você (Bullseye)</span>
                        </div>
                        <span class="font-black text-xl italic text-red-600" x-text="points"></span>
                    </div>
                    <!-- Outros (Simulados) -->
                    <div class="bg-white border p-4 rounded-3xl flex items-center justify-between opacity-50">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-xl italic text-gray-400">#2</span>
                            <div class="w-10 h-10 bg-gray-200 rounded-full"></div>
                            <span class="font-bold text-gray-400 italic uppercase">Collector_99</span>
                        </div>
                        <span class="font-black text-gray-400">850</span>
                    </div>
                </div>
            </div>
        </template>

    </main>

    <!-- NAVEGAÇÃO INFERIOR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-lg border-t p-3 flex justify-around items-center z-50">
        <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'text-red-500' : 'text-gray-400'" class="flex flex-col items-center gap-1 transition">
            <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Início</span>
        </button>
        <button @click="view = 'ai'" :class="view === 'ai' ? 'text-red-500' : 'text-gray-400'" class="flex flex-col items-center gap-1 transition">
            <i data-lucide="bot" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">IA Especialista</span>
        </button>
        <button @click="view = 'ranking'" :class="view === 'ranking' ? 'text-red-500' : 'text-gray-400'" class="flex flex-col items-center gap-1 transition">
            <i data-lucide="trophy" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Ranking</span>
        </button>
    </nav>

    <script>
        function app() {
            return {
                view: 'dashboard',
                points: parseInt(localStorage.getItem('points')) || 0,
                items: JSON.parse(localStorage.getItem('items')) || [],
                messages: [
                    { role: 'ai', text: "<b>Olá! Sou o Especialista de Raridade.</b><br>Envie uma foto do seu item e eu farei uma análise precisa de mercado e raridade utilizando inteligência moderna!" }
                ],
                
                addItem(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const newItem = {
                            id: Date.now(),
                            name: "Item Colecionável #" + (this.items.length + 1),
                            rarity: ["Comum", "Incomum", "Raro", "Lendário"][Math.floor(Math.random() * 4)],
                            category: "Colecionáveis e Memorabilia",
                            img: e.target.result
                        };
                        this.items.unshift(newItem);
                        this.points += 10;
                        this.save();
                    };
                    reader.readAsDataURL(file);
                },

                removeItem(id) {
                    this.items = this.items.filter(i => i.id !== id);
                    this.points = Math.max(0, this.points - 10);
                    this.save();
                },

                save() {
                    localStorage.setItem('points', this.points);
                    localStorage.setItem('items', JSON.stringify(this.items));
                },

                // Simulação da IA (Para IA real, você precisaria de uma API Key da OpenAI no backend)
                analyzeRarity(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    this.messages.push({ role: 'user', text: "📸 [Foto enviada para análise]" });
                    
                    setTimeout(() => {
                        this.messages.push({ 
                            role: 'ai', 
                            text: "<b>Análise Concluída com Sucesso!</b><br>Identifiquei um item de alta demanda. Baseado nos dados de mercado de 2024:<br><br>• <b>Estado:</b> Excelente (Mint)<br>• <b>Raridade:</b> Incomum<br>• <b>Valor Est.:</b> R$ 450,00 - R$ 700,00<br><br>Deseja adicionar este item à sua coleção para ganhar +10 pontos?" 
                        });
                    }, 1500);
                },

                init() {
                    lucide.createIcons();
                    this.$watch('view', () => setTimeout(() => lucide.createIcons(), 10));
                }
            }
        }
    </script>
</body>
              </html>
